name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - name: Lint maintained Python code (blocking)
        shell: bash
        run: |
          targets=()
          for d in tools validation tests; do
            [ -d "$d" ] && targets+=("$d")
          done

          if [ ${#targets[@]} -eq 0 ]; then
            echo "No lint targets found, skipping blocking lint check."
            exit 0
          fi

          ruff check "${targets[@]}" --output-format=github
      - name: Lint MCP servers (non-blocking, informational)
        shell: bash
        run: |
          if [ -d mcp-servers ]; then
            ruff check mcp-servers/ --output-format=github || true
          else
            echo "mcp-servers/ not found, skipping informational lint check."
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]" PyMuPDF pypdf
      - name: Run tests if present
        shell: bash
        run: |
          if [ -d tests ] && find tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -v --tb=short
          else
            echo "No tests found under tests/, skipping pytest."
          fi
