name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - name: Lint tests (blocking)
        shell: bash
        run: |
          if [ -d tests ]; then
            ruff check tests/ --output-format=github
          else
            echo "tests/ not found, skipping blocking lint check."
          fi
      - name: Lint tools and validation (non-blocking, informational)
        shell: bash
        run: |
          targets=()
          for d in tools validation; do
            [ -d "$d" ] && targets+=("$d")
          done

          if [ ${#targets[@]} -gt 0 ]; then
            ruff check "${targets[@]}" --output-format=github || true
          else
            echo "tools/validation targets not found, skipping informational lint check."
          fi
      - name: Lint MCP servers (non-blocking, informational)
        shell: bash
        run: |
          if [ -d mcp-servers ]; then
            ruff check mcp-servers/ --output-format=github || true
          else
            echo "mcp-servers/ not found, skipping informational lint check."
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]" PyMuPDF pypdf
      - name: Run tests if present
        shell: bash
        run: |
          if [ -d tests ] && find tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -v --tb=short
          else
            echo "No tests found under tests/, skipping pytest."
          fi
